<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faizan Shafi</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family: 'Poppins', sans-serif; }

body {
  background: #000;
  color: #fff;
  overflow-x: hidden;
  min-height:100vh;
}

/* FIRE BACKGROUND */
.background {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  z-index:-1;
  overflow:hidden;
  background: linear-gradient(to top, #020312 20%, #0b1a3a 60%, #000 100%);
}

/* Stars */
.star {
  position:absolute;
  width:2px; height:2px;
  background:white;
  border-radius:50%;
  animation: twinkle 2s infinite ease-in-out;
}
@keyframes twinkle {
  0%,100%{opacity:0.3}
  50%{opacity:1}
}

/* River */
.river {
  position:absolute;
  bottom:0;
  width:100%;
  height:30%;
  background: linear-gradient(to top, #0a2a4f, transparent);
  opacity:0.7;
}

/* Trees (silhouette) */
.tree {
  position:absolute;
  bottom:0;
  width:0;
  height:0;
  border-left:20px solid transparent;
  border-right:20px solid transparent;
  border-bottom:60px solid #000;
}

.tree::after {
  content:'';
  position:absolute;
  top:40px;
  left:-5px;
  width:10px;
  height:20px;
  background:#000;
}


.fire {
  position:absolute;
  bottom:0;
  width:100%;
  height:100%;
  background: linear-gradient(to top, rgba(255,80,0,0.8), transparent);
  animation: fireMove 3s infinite ease-in-out alternate;
}

@keyframes fireMove {
  0% { transform: translateY(0) scaleY(1); opacity:0.8; }
  100% { transform: translateY(-30px) scaleY(1.2); opacity:1; }
}

/* Center Wrapper */
.center-wrapper {
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}

/* Intro */
#intro {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#000;
  z-index:1000;
}
#intro h1 {
  font-size:3rem;
  letter-spacing:3px;
  animation: zoomFade 3s ease forwards;
}

@keyframes zoomFade {
  0% { opacity:0; transform: scale(0.5); }
  50% { opacity:1; }
  100% { opacity:0; transform: scale(1.2); }
}

/* Main */
#main {
  opacity:0;
  transition: opacity 1.5s ease;
  width:100%;
  max-width:700px;
}
#main.show { opacity:1; }

.message {
  font-size:1.3rem;
  line-height:1.5;
  text-align:center;
  background: rgba(0,0,0,0.5);
  padding:22px;
  border-radius:20px;
  backdrop-filter: blur(10px);
  box-shadow:0 0 40px rgba(255,80,0,0.4);
  animation: fadeIn 2s ease;
}

@keyframes fadeIn {
  from { opacity:0; transform: translateY(30px);} 
  to { opacity:1; transform: translateY(0);} 
}

@media (max-width:600px) {
  #intro h1 { font-size:2rem; }
  .message { font-size:1.1rem; }
}
</style>
</head>
<body>

<div class="background">
  <div id="stars"></div>
  <div class="river"></div>
  <div class="tree" style="left:10%"></div>
  <div class="tree" style="left:25%; transform: scale(1.2)"></div>
  <div class="tree" style="left:40%"></div>
  <div class="tree" style="left:60%; transform: scale(1.3)"></div>
  <div class="tree" style="left:75%"></div>
  <div class="tree" style="left:90%; transform: scale(1.1)"></div>
</div>
</div>

<div id="intro">
  <h1>Faizan Shafi</h1>
</div>

<div class="center-wrapper">
  <div id="main">
    <div class="message" id="text"></div>
  </div>
</div>

<script>
// Generate stars
const starsContainer = document.getElementById('stars');
for (let i = 0; i < 150; i++) {
  let star = document.createElement('div');
  star.classList.add('star');
  star.style.top = Math.random() * 100 + 'vh';
  star.style.left = Math.random() * 100 + 'vw';
  star.style.animationDelay = Math.random() * 2 + 's';
  starsContainer.appendChild(star);
}

// Transition
setTimeout(() => {
  document.getElementById('intro').style.display = 'none';
  document.getElementById('main').classList.add('show');
  typeText();
}, 3500);

// Message
const message = `1.Small learning every day leads to big success.
2. Nothing can destroy iron except its own rust it the same way no one can destory you except your own mindset.
3.Great succes requires greater sacrifices`;

let index = 0;
function typeText() {
  if (index < message.length) {
    document.getElementById('text').innerHTML += message.charAt(index);
    index++;
    setTimeout(typeText, 25);
  }
}
</script>

</body>
</html>
