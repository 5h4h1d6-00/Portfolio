<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pro Ludo Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Segoe UI, sans-serif;
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    color:white;
    display:flex;
    flex-direction:column;
    align-items:center;
}

h1{
    margin-top:20px;
}

#controls{
    margin:15px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

button, select{
    padding:8px 15px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button{
    background:#00c6ff;
    color:white;
}

.board{
    display:grid;
    grid-template-columns:repeat(15,30px);
    grid-template-rows:repeat(15,30px);
    gap:1px;
    margin:20px;
}

.cell{
    width:30px;
    height:30px;
    background:#eee;
}

.red{background:#ff4d4d;}
.green{background:#4dff4d;}
.yellow{background:#ffff4d;}
.blue{background:#4d4dff;}

.token{
    width:20px;
    height:20px;
    border-radius:50%;
    margin:auto;
}

#dice{
    font-size:20px;
    margin:10px;
}

#status{
    margin:10px;
}
</style>
</head>
<body>

<h1>🎲 Pro Ludo Game</h1>

<div id="controls">
    <select id="mode">
        <option value="2">2 Players</option>
        <option value="4">4 Players</option>
    </select>
    <button onclick="startGame()">Start</button>
    <button onclick="rollDice()">Roll Dice</button>
    <button onclick="restartGame()">Restart</button>
    <button onclick="goBack()">Back</button>
</div>

<div id="dice">Dice: -</div>
<div id="status"></div>

<div class="board" id="board"></div>

<script>
const boardEl=document.getElementById("board");
let players=[];
let currentPlayerIndex=0;
let diceValue=0;

function createBoard(){
boardEl.innerHTML="";
for(let i=0;i<225;i++){
let cell=document.createElement("div");
cell.className="cell";
boardEl.appendChild(cell);
}
}

function startGame(){
let mode=parseInt(document.getElementById("mode").value);
players=[];
const colors=["red","green","yellow","blue"];

for(let i=0;i<mode;i++){
players.push({
color:colors[i],
position:-1,
finished:false
});
}

currentPlayerIndex=0;
createBoard();
renderTokens();
updateStatus();
}

function renderTokens(){
const cells=document.querySelectorAll(".cell");
cells.forEach(cell=>cell.innerHTML="");

players.forEach(player=>{
if(player.position>=0 && player.position<225){
let token=document.createElement("div");
token.className="token "+player.color;
cells[player.position].appendChild(token);
}
});
}

function rollDice(){
diceValue=Math.floor(Math.random()*6)+1;
document.getElementById("dice").innerText="Dice: "+diceValue;
moveToken();
}

function moveToken(){
let player=players[currentPlayerIndex];

if(player.position===-1){
if(diceValue===6){
player.position=0;
}else{
nextTurn();
return;
}
}else{
player.position+=diceValue;
if(player.position>=224){
player.finished=true;
document.getElementById("status").innerText=
player.color.toUpperCase()+" Wins!";
return;
}
}

captureCheck();
renderTokens();

if(diceValue!==6){
nextTurn();
}
updateStatus();
}

function captureCheck(){
let current=players[currentPlayerIndex];
players.forEach((p,i)=>{
if(i!==currentPlayerIndex &&
p.position===current.position){
p.position=-1;
}
});
}

function nextTurn(){
currentPlayerIndex=(currentPlayerIndex+1)%players.length;
}

function updateStatus(){
document.getElementById("status").innerText=
"Turn: "+players[currentPlayerIndex].color.toUpperCase();
}

function restartGame(){
startGame();
}

function goBack(){
window.location.href="../index.html";
}

createBoard();
</script>

</body>
</html>
